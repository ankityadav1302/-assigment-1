<!DOCTYPE html>
<html>
<head>
  <title>Smart Event Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 class="title">🎯 Smart Event Dashboard</h1>

  <div class="container">

    <!-- LEFT FORM -->
    <div class="card form-card">
      <h2>Add New Event</h2>

      <label>Event Title:</label>
      <input type="text" id="title">

      <label>Event Date:</label>
      <input type="date" id="date">

      <label>Category:</label>
      <select id="category">
        <option>Conference</option>
        <option>Social</option>
        <option>Workshop</option>
      </select>

      <label>Description:</label>
      <textarea id="desc"></textarea>

      <button class="gradient-btn" onclick="addEvent()">Add Event</button>
    </div>

    <!-- RIGHT EVENTS -->
    <div class="card event-card">
      <h2>My Events</h2>

      <div class="top-buttons">
        <button class="gradient-btn" onclick="clearEvents()">Clear All Events</button>
        <button class="gradient-btn" onclick="addSample()">Add Sample Events</button>
      </div>

      <div id="eventList"></div>
    </div>

  </div>

  <!-- DOM Demo Section -->
  <div class="card dom-card">
    <h2>DOM Manipulation Demo</h2>
    <p><b>innerText vs innerHTML vs textContent</b></p>
    <div class="demo-box">
      <p>Original HTML: &lt;strong&gt;Bold Text&lt;/strong&gt;</p>
      <p>innerHTML: Renders HTML</p>
      <p>innerText: Removes HTML</p>
      <p>textContent: Keeps spaces</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
